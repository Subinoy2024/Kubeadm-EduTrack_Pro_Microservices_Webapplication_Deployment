apiVersion: apps/v1
kind: Deployment
metadata:
  name: assignment-service
  namespace: edutrack
  labels:
    app: assignment-service
    app.kubernetes.io/part-of: edutrack
spec:
  replicas: 2
  selector:
    matchLabels:
      app: assignment-service
  template:
    metadata:
      labels:
        app: assignment-service
        app.kubernetes.io/part-of: edutrack
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: assignment-service
          image: edutrack/assignment-service:latest
          ports:
            - containerPort: 3004
              protocol: TCP
          envFrom:
            - configMapRef:
                name: assignment-service-config
            - secretRef:
                name: edutrack-secrets
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
