apiVersion: v1
kind: ConfigMap
metadata:
  name: recording-service-config
  namespace: edutrack
  labels:
    app: recording-service
    app.kubernetes.io/part-of: edutrack
data:
  NODE_ENV: "production"
  PORT: "3006"
  STORAGE_PATH: "/data/recordings"
  MAX_RECORDING_DURATION_MINUTES: "180"
  SUPPORTED_FORMATS: "mp4,webm"
  LOG_LEVEL: "info"
