apiVersion: v1
kind: ConfigMap
metadata:
  name: course-service-config
  namespace: edutrack
  labels:
    app: course-service
    app.kubernetes.io/part-of: edutrack
data:
  NODE_ENV: "production"
  PORT: "3003"
  ASSIGNMENT_SERVICE_URL: "http://assignment-service:3004"
  USER_SERVICE_URL: "http://user-service:3002"
  MAX_COURSE_SIZE: "500"
  LOG_LEVEL: "info"
