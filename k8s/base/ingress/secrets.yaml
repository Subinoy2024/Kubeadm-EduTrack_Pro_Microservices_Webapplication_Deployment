apiVersion: v1
kind: Secret
metadata:
  name: edutrack-secrets
  namespace: edutrack
  labels:
    app.kubernetes.io/part-of: edutrack
type: Opaque
stringData:
  DATABASE_URL: "postgresql://edutrack:changeme@postgres:5432/edutrack"
  JWT_SECRET: "change-this-to-a-secure-random-string"
  REDIS_URL: "redis://redis:6379"
  SMTP_USER: "smtp-user@example.com"
  SMTP_PASS: "change-this-smtp-password"
