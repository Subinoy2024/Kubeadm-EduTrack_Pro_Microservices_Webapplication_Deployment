apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-chat-service-config
  namespace: edutrack
  labels:
    app: ai-chat-service
    app.kubernetes.io/part-of: edutrack
data:
  NODE_ENV: "production"
  PORT: "3007"
  AI_MODEL: "gpt-4"
  MAX_TOKENS: "4096"
  CONVERSATION_HISTORY_LIMIT: "50"
  COURSE_SERVICE_URL: "http://course-service:3003"
  LOG_LEVEL: "info"
