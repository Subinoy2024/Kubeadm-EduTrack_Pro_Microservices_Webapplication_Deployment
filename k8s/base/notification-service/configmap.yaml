apiVersion: v1
kind: ConfigMap
metadata:
  name: notification-service-config
  namespace: edutrack
  labels:
    app: notification-service
    app.kubernetes.io/part-of: edutrack
data:
  NODE_ENV: "production"
  PORT: "3008"
  SMTP_HOST: "smtp.example.com"
  SMTP_PORT: "587"
  EMAIL_FROM: "noreply@edutrack.example.com"
  NOTIFICATION_BATCH_SIZE: "100"
  LOG_LEVEL: "info"
