apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: edutrack
spec:
  selector:
    app: api-gateway
  ports:
    - name: http
      port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: edutrack
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api-gateway
          image: YOUR_IMAGE_REGISTRY/edutrack-api-gateway:YOUR_IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: NODE_ENV
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: edutrack-secrets
                  key: JWT_SECRET
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: CORS_ORIGINS
            - name: AUTH_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: AUTH_SERVICE_URL
            - name: USER_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: USER_SERVICE_URL
            - name: COURSE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: COURSE_SERVICE_URL
            - name: ASSIGNMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: ASSIGNMENT_SERVICE_URL
            - name: MEETING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: MEETING_SERVICE_URL
            - name: RECORDING_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: RECORDING_SERVICE_URL
            - name: AI_CHAT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: AI_CHAT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: edutrack-config
                  key: NOTIFICATION_SERVICE_URL
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop: ["ALL"]
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
